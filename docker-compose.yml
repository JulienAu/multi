services:
  db:
    image: postgres:16-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: multi
      POSTGRES_PASSWORD: multi
      POSTGRES_DB: multi
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U multi"]
      interval: 2s
      timeout: 5s
      retries: 10

  mail:
    image: axllent/mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: npx drizzle-kit push
    env_file:
      - .env.local
    depends_on:
      db:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3002:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - .env.local
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
