name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-push:
    name: Build + push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=
            type=raw,value=latest,enable={{is_default_branch}}

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Apply manifests on k3s
    needs: build-push
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Set image tag
        working-directory: deploy/overlays/${{ github.event.inputs.environment || 'production' }}
        run: |
          SHA=${GITHUB_SHA}
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          kustomize edit set image ghcr.io/OWNER/multi=ghcr.io/${OWNER}/${{ github.event.repository.name }}:${SHA}

      - name: Delete old migrate job
        run: |
          NS=${{ github.event.inputs.environment == 'staging' && 'multi-staging' || 'multi' }}
          kubectl -n $NS delete job multi-migrate --ignore-not-found

      - name: Apply
        run: |
          kustomize build deploy/overlays/${{ github.event.inputs.environment || 'production' }} | kubectl apply -f -

      - name: Wait for rollout
        run: |
          NS=${{ github.event.inputs.environment == 'staging' && 'multi-staging' || 'multi' }}
          kubectl -n $NS rollout status deployment/multi-app --timeout=5m

      - name: Wait for migrate job
        run: |
          NS=${{ github.event.inputs.environment == 'staging' && 'multi-staging' || 'multi' }}
          kubectl -n $NS wait --for=condition=complete --timeout=5m job/multi-migrate || true
