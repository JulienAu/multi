name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: TypeScript
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint .

  build:
    name: Next.js build
    runs-on: ubuntu-latest
    needs: lint-typecheck
    env:
      # Dummy env vars required at boot. Real ones come from Doppler in prod.
      JWT_SECRET: ci-dummy-jwt-secret-not-for-prod-use
      OPENCLAW_WEBHOOK_SECRET: ci-dummy-webhook-secret
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      OPENROUTER_API_KEY: ci-dummy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build (Turbopack)
        run: npm run build
