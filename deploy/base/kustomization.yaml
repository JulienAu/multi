apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - rbac.yaml
  - postgres.yaml
  - app.yaml
  - ingress.yaml
  - migrate-job.yaml
  - network-policy.yaml

# Image tag is patched per-overlay (staging uses sha, production uses semver).
images:
  - name: ghcr.io/julienau/multi
    newTag: latest
