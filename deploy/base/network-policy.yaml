# Base NetworkPolicies — applied to the `multi` namespace.
# Per-business workspace namespaces are created dynamically by the k3s orchestrator
# and get their own default-deny policies (cf. lib/orchestrator/k3s.ts when implemented).

# 1. Default deny all egress from the app namespace unless allowed below.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: multi
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# 2. Allow ingress from Traefik (default k3s ingress controller in kube-system).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-ingress
  namespace: multi
spec:
  podSelector:
    matchLabels:
      app: multi-app
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 3000
          protocol: TCP

---
# 2b. Allow Traefik to reach cert-manager ACME HTTP-01 solver pods.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-acme-solver
  namespace: multi
spec:
  podSelector:
    matchLabels:
      acme.cert-manager.io/http01-solver: "true"
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 8089
          protocol: TCP
  egress:
    - {}

---
# 3. Allow app egress to DNS + HTTPS (OpenRouter, Stripe, Postmark, etc.)
# Neon DB: allow TCP 5432 to any destination (Neon is cloud-hosted).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress
  namespace: multi
spec:
  podSelector:
    matchLabels:
      app: multi-app
  policyTypes:
    - Egress
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # k8s API server (ClusterIP DNAT resolves to control plane node)
    - to:
        - ipBlock:
            cidr: 10.0.1.0/24
      ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    # HTTPS outbound (APIs tierces)
    - ports:
        - port: 443
          protocol: TCP
    # Postgres (Neon)
    - ports:
        - port: 5432
          protocol: TCP
    # App → workspace pods (OpenClaw API port 18789 + preview port 3000)
    - to:
        - namespaceSelector:
            matchLabels:
              tier: workspace
      ports:
        - port: 18789
          protocol: TCP
        - port: 3000
          protocol: TCP

---
# 3b. Allow postgres to receive connections from within the namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres
  namespace: multi
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - port: 5432
          protocol: TCP
  egress:
    - {}

---
# 3c. Allow migrate job egress to DNS + postgres.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-migrate
  namespace: multi
spec:
  podSelector:
    matchLabels:
      job-name: multi-migrate
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
          protocol: TCP

---
# 4. Allow user workspaces to reach app's /api/llm/v1 and /api/agents/webhook ONLY.
# (En pratique : tout pod dans un namespace `workspace-*` peut taper le service multi-app.
# La restriction au path est faite côté app via auth token, pas au niveau réseau.)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-workspaces
  namespace: multi
spec:
  podSelector:
    matchLabels:
      app: multi-app
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              tier: workspace
      ports:
        - port: 3000
          protocol: TCP
